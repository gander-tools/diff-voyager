name: AI Issue Assessment

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-assessment:
    runs-on: ubuntu-latest
    steps:
      - name: AI Assessment and Labeling
        uses: github/ai-assessment-comment-labeler@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
