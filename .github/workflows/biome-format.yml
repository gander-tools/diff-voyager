name: Biome Auto-Format

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - 'claude/**'

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Start with minimal permissions, grant write only when needed
permissions:
  contents: read
  pull-requests: read

jobs:
  format:
    name: Auto-format with Biome
    runs-on: ubuntu-latest
    # Only auto-commit for PRs from the same repository (not forks)
    # This prevents untrusted code execution in a privileged context
    if: github.event.pull_request.head.repo.full_name == github.repository

    # Grant write permission only to this specific job
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Run Biome format
        id: biome
        run: |
          # Pin Biome to specific version for security and reproducibility
          npx @biomejs/biome@2.3.11 check --write
          echo "format_exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Configure git
        if: steps.biome.outputs.format_exit_code == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit formatted changes
        if: steps.biome.outputs.format_exit_code == '0'
        id: commit
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No formatting changes needed"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "style: auto-format code with Biome [skip ci]"
            git push origin ${{ github.head_ref }}
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "✅ Code formatted and committed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for formatting errors
        if: steps.biome.outputs.format_exit_code != '0'
        run: |
          echo "## ❌ Biome Formatting Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Biome reported errors that require manual intervention." >> $GITHUB_STEP_SUMMARY
          echo "Please run \`npx @biomejs/biome check --write\` locally and fix any errors." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For errors requiring unsafe fixes, run \`npx @biomejs/biome check --write --unsafe\`" >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Summary
        if: steps.biome.outputs.format_exit_code == '0' && steps.commit.outputs.changes == 'false'
        run: |
          echo "## ✅ Code Already Properly Formatted" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No formatting changes were needed." >> $GITHUB_STEP_SUMMARY

  # For fork PRs: check formatting only, don't auto-commit (security)
  format-check-only:
    name: Check Formatting (Fork PR)
    runs-on: ubuntu-latest
    # Only run for PRs from forks
    if: github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout PR code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Check Biome formatting
        run: |
          # Pin Biome to specific version for security and reproducibility
          npx @biomejs/biome@2.3.11 ci

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Code is Properly Formatted" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This is a fork PR - formatting was checked but not auto-fixed." >> $GITHUB_STEP_SUMMARY
          echo "If formatting changes are needed, please run \`npx @biomejs/biome check --write\` locally." >> $GITHUB_STEP_SUMMARY
