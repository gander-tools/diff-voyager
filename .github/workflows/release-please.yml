on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.idea/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38
        with:
          # Uses config-file and manifest-file for monorepo support
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # SECURITY NOTE: We do NOT checkout the release PR branch here.
      # release-please handles all version bumps automatically.
      # Post-release actions (like publishing) should only run after
      # the release PR is merged and releases are created.

